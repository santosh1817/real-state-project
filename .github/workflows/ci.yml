name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/real_estate_platform
      JWT_ACCESS_SECRET: ci-access-secret-that-is-long-enough
      JWT_REFRESH_SECRET: ci-refresh-secret-that-is-long-enough
      CLIENT_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npx prisma validate
        working-directory: backend
      - run: npm run prisma:generate --prefix backend
      - run: npm run build --prefix frontend
